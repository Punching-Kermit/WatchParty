<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cinema Sync Master</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .panel { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Invite Section */
        .invite-section { background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px dashed #444; margin-bottom: 15px; }
        .invite-btn { background: #6c5ce7; color: #fff; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }

        /* Input Group */
        input { width: 100%; padding: 14px; box-sizing: border-box; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin-bottom: 10px; }
        button.main-action { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-green { background: #2ecc71; color: white; margin-top: 10px; }
        
        video { width: 100%; border-radius: 12px; background: #000; margin-top: 15px; border: 1px solid #333; }
        #status { color: #ffa502; font-size: 0.85rem; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="invite-section">
            <p style="font-size: 0.7rem; color: #aaa; margin-top: 0;">Step 1: Send this to her</p>
            <button class="invite-btn" id="invite-btn" onclick="shareInvite()">Generate Invite Link</button>
        </div>

        <div id="status">Initializing...</div>

        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <input type="text" id="movie-url" placeholder="Movie Link (MP4/MKV)">
        <input type="text" id="sub-url" placeholder="Subtitle Link (VTT)">
        <button class="main-action btn-green" onclick="syncEverything()">2. Play for Both</button>
    </div>

    <video id="player" controls playsinline crossorigin="anonymous"></video>

    <script>
        const v = document.getElementById('player');
        const status = document.getElementById('status');
        const inviteBtn = document.getElementById('invite-btn');
        let conn;

        // PeerJS Setup
        const peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });

        peer.on('open', id => {
            status.innerText = "Ready to Host";
            // Check if WE were invited
            const urlParams = new URLSearchParams(window.location.search);
            const hostId = urlParams.get('join');
            if (hostId) {
                status.innerText = "Joining host...";
                connectToPartner(hostId);
            }
        });

        // Generate a link that automatically connects her to YOU
        function shareInvite() {
            const inviteUrl = window.location.origin + window.location.pathname + "?join=" + peer.id;
            navigator.clipboard.writeText(inviteUrl);
            inviteBtn.innerText = "Link Copied! Send to her.";
            setTimeout(() => { inviteBtn.innerText = "Generate Invite Link"; }, 3000);
        }

        // Handle incoming connection
        peer.on('connection', c => {
            conn = c;
            status.innerText = "CONNECTED!";
            initConnection();
        });

        function connectToPartner(fID) {
            conn = peer.connect(fID);
            conn.on('open', () => {
                status.innerText = "CONNECTED!";
                initConnection();
            });
        }

        function initConnection() {
            conn.on('data', data => {
                if (data.type === 'load') {
                    v.src = data.url;
                    if(data.sub) applySubs(data.sub);
                    v.load();
                } else if (data.type === 'play') {
                    v.currentTime = data.time;
                    v.play();
                } else if (data.type === 'pause') {
                    v.pause();
                }
            });
        }

        function applySubs(url) {
            const old = v.querySelectorAll('track');
            old.forEach(t => t.remove());
            const t = document.createElement('track');
            t.src = url; t.kind = "subtitles"; t.srclang = "en"; t.label = "English"; t.default = true;
            v.appendChild(t);
        }

        function syncEverything() {
            const m = document.getElementById('movie-url').value;
            const s = document.getElementById('sub-url').value;
            v.src = m;
            if(s) applySubs(s);
            v.load();
            if(conn) conn.send({ type: 'load', url: m, sub: s });
        }

        // Sync Playback
        v.onplay = () => { if(conn) conn.send({ type: 'play', time: v.currentTime }); };
        v.onpause = () => { if(conn) conn.send({ type: 'pause' }); };
    </script>
</body>
</html>
