<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cinema Sync Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .panel { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .invite-section { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        .invite-btn { background: #6c5ce7; color: #fff; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 14px; box-sizing: border-box; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin-bottom: 10px; font-size: 0.9rem; }
        button.main-action { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-green { background: #2ecc71; color: white; margin-top: 10px; }
        video { width: 100%; border-radius: 12px; background: #000; margin-top: 15px; border: 1px solid #333; }
        #status { color: #ffa502; font-size: 0.85rem; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="invite-section">
            <button class="invite-btn" id="invite-btn" onclick="shareInvite()">Copy Connection Link</button>
            <div id="status">Ready to Connect</div>
        </div>
        <hr style="border: 0.5px solid #333; margin: 25px 0;">
        <input type="text" id="movie-url" placeholder="Direct Movie URL (MP4/MKV)">
        <input type="text" id="sub-url" placeholder="Subtitle URL (VTT)">
        <button class="main-action btn-green" onclick="syncEverything()">Sync & Play for All</button>
    </div>

    <video id="player" controls playsinline crossorigin="anonymous"></video>

    <script>
        const v = document.getElementById('player');
        const status = document.getElementById('status');
        const inviteBtn = document.getElementById('invite-btn');
        let conn;

        const peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });

        peer.on('open', id => {
            const urlParams = new URLSearchParams(window.location.search);
            const joinId = urlParams.get('join');
            if (joinId) connectToPartner(joinId);
        });

        function shareInvite() {
            const inviteUrl = window.location.origin + window.location.pathname + "?join=" + peer.id;
            navigator.clipboard.writeText(inviteUrl);
            inviteBtn.innerText = "Link Copied!";
            setTimeout(() => { inviteBtn.innerText = "Copy Connection Link"; }, 3000);
        }

        peer.on('connection', c => {
            conn = c;
            status.innerText = "STATUS: CONNECTED";
            initConnection();
        });

        function connectToPartner(fID) {
            conn = peer.connect(fID);
            conn.on('open', () => {
                status.innerText = "STATUS: CONNECTED";
                initConnection();
            });
        }

        function initConnection() {
            conn.on('data', data => {
                if (data.type === 'load') {
                    forceLoadVideo(data.url, data.sub);
                } else if (data.type === 'play') {
                    v.currentTime = data.time;
                    v.play().catch(e => console.log("Autoplay blocked"));
                } else if (data.type === 'pause') {
                    v.pause();
                }
            });
        }

        function forceLoadVideo(m, s) {
            v.pause();
            v.removeAttribute('src'); // Clear previous
            v.load();
            
            // Set new source
            v.src = m;
            if(s) {
                const old = v.querySelectorAll('track');
                old.forEach(t => t.remove());
                const t = document.createElement('track');
                t.src = s; t.kind = "subtitles"; t.srclang = "en"; t.label = "English"; t.default = true;
                v.appendChild(t);
            }
            v.load();
            status.innerText = "Video Loaded!";
        }

        function syncEverything() {
            const m = document.getElementById('movie-url').value.trim();
            const s = document.getElementById('sub-url').value.trim();
            if(!m) return alert("Paste movie link!");

            forceLoadVideo(m, s);
            
            if(conn && conn.open) {
                conn.send({ type: 'load', url: m, sub: s });
            }
        }

        v.onplay = () => { if(conn && conn.open) conn.send({ type: 'play', time: v.currentTime }); };
        v.onpause = () => { if(conn && conn.open) conn.send({ type: 'pause' }); };
    </script>
</body>
</html>
