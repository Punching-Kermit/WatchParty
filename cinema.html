<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cinema Sync Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .panel { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; box-sizing: border-box; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-purple { background: #6c5ce7; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        
        .video-container { position: relative; width: 100%; margin-top: 15px; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; display: block; }
        
        /* HARD-CODED OVERLAY */
        #sub-box {
            position: absolute;
            bottom: 10%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 999;
            pointer-events: none;
        }
        #sub-text {
            background: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            font-size: 1.1rem;
            padding: 4px 12px;
            border-radius: 5px;
            display: inline-block;
            max-width: 80%;
            line-height: 1.4;
        }
        #status { color: #ffa502; font-size: 0.8rem; margin: 10px 0; font-weight: bold; }
        #debug { color: #ff4757; font-size: 0.7rem; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="panel">
        <button class="btn-purple" onclick="shareInvite()" id="invite-btn">Copy Connection Link</button>
        <div id="status">System Ready</div>
        <input type="text" id="movie-url" placeholder="Movie Link">
        <input type="text" id="sub-url" placeholder="Subtitle Link (.vtt)">
        <button class="btn-green" onclick="syncEverything()">Sync & Play for All</button>
        <div id="debug"></div>
    </div>

    <div class="video-container">
        <video id="player" controls playsinline crossorigin="anonymous"></video>
        <div id="sub-box"><span id="sub-text"></span></div>
    </div>

    <script>
        const v = document.getElementById('player');
        const subText = document.getElementById('sub-text');
        const debug = document.getElementById('debug');
        let conn, subtitles = [];
        const peer = new Peer();

        peer.on('open', id => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('join')) connectToPeer(urlParams.get('join'));
        });

        function shareInvite() {
            const inviteUrl = window.location.origin + window.location.pathname + "?join=" + peer.id;
            navigator.clipboard.writeText(inviteUrl);
            document.getElementById('invite-btn').innerText = "Link Copied!";
        }

        peer.on('connection', newConn => { conn = newConn; setupEvents(); });
        function connectToPeer(id) { conn = peer.connect(id); setupEvents(); }

        function setupEvents() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "STATUS: CONNECTED";
                conn.on('data', data => {
                    if (data.type === 'load') { loadVideo(data.url, data.sub); }
                    else if (data.type === 'play') { v.currentTime = data.time; v.play().catch(() => {}); }
                    else if (data.type === 'pause') { v.pause(); }
                });
            });
        }

        async function fetchSubtitles(url) {
            subtitles = [];
            if (!url) return;
            debug.innerText = "Fetching subtitles...";
            
            try {
                // Using a different proxy for better compatibility
                const proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);
                const response = await fetch(proxy);
                const text = await response.text();
                
                const lines = text.split(/\r?\n/);
                let current = null;

                lines.forEach(line => {
                    if (line.includes('-->')) {
                        const times = line.split(' --> ');
                        current = { start: toSec(times[0]), end: toSec(times[1]), text: "" };
                    } else if (current && line.trim() !== "" && !line.includes('WEBVTT')) {
                        current.text += line.trim() + " ";
                        if (!subtitles.find(s => s.start === current.start)) {
                            subtitles.push(current);
                        }
                    }
                });
                debug.innerText = "Subtitles Loaded: " + subtitles.length + " lines";
            } catch (e) {
                debug.innerText = "Error: " + e.message;
            }
        }

        function toSec(t) {
            const p = t.trim().replace(',', '.').split(':');
            let s = 0;
            if (p.length === 3) s = (+p[0]) * 3600 + (+p[1]) * 60 + (+p[2]);
            else s = (+p[0]) * 60 + (+p[1]);
            return s;
        }

        v.ontimeupdate = () => {
            const now = v.currentTime;
            const match = subtitles.find(s => now >= s.start && now <= s.end);
            subText.innerHTML = match ? match.text : "";
        };

        function loadVideo(m, s) {
            v.pause();
            v.src = m;
            fetchSubtitles(s);
            v.load();
        }

        function syncEverything() {
            const m = document.getElementById('movie-url').value.trim();
            const s = document.getElementById('sub-url').value.trim();
            loadVideo(m, s);
            if (conn && conn.open) conn.send({ type: 'load', url: m, sub: s });
        }

        v.onplay = () => { if(conn && conn.open) conn.send({ type: 'play', time: v.currentTime }); };
        v.onpause = () => { if(conn && conn.open) conn.send({ type: 'pause' }); };
    </script>
</body>
</html>
