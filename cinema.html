<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cinema Sync Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .panel { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; box-sizing: border-box; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-purple { background: #6c5ce7; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        
        /* CONTAINER FOR OVERLAY */
        .video-wrap { position: relative; width: 100%; margin-top: 15px; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; display: block; }
        
        /* CUSTOM SUBTITLE STYLE */
        #sub-display {
            position: absolute;
            bottom: 15%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 2147483647; /* Highest possible depth */
            pointer-events: none;
        }
        #sub-text {
            background: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            font-size: 1.1rem;
            padding: 4px 12px;
            border-radius: 4px;
            display: inline-block;
            max-width: 85%;
            line-height: 1.4;
            text-shadow: 1px 1px 2px #000;
        }
        #status { color: #ffa502; font-size: 0.8rem; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="panel">
        <button class="btn-purple" onclick="shareInvite()" id="invite-btn">Copy Connection Link</button>
        <div id="status">System Ready</div>
        <input type="text" id="movie-url" placeholder="Movie Link">
        <input type="text" id="sub-url" placeholder="Subtitle Link (.vtt)">
        <button class="btn-green" onclick="syncEverything()">Sync & Play for All</button>
    </div>

    <div class="video-wrap">
        <video id="player" controls playsinline crossorigin="anonymous"></video>
        <div id="sub-display"><span id="sub-text"></span></div>
    </div>

    <script>
        const v = document.getElementById('player');
        const st = document.getElementById('sub-text');
        let conn, subs = [];
        const peer = new Peer();

        peer.on('open', id => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('join')) connect(urlParams.get('join'));
        });

        function shareInvite() {
            const inviteUrl = window.location.origin + window.location.pathname + "?join=" + peer.id;
            navigator.clipboard.writeText(inviteUrl);
            document.getElementById('invite-btn').innerText = "Link Copied!";
        }

        peer.on('connection', c => { conn = c; setup(); });
        function connect(id) { conn = peer.connect(id); setup(); }

        function setup() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "STATUS: CONNECTED";
                conn.on('data', d => {
                    if (d.type === 'load') { loadVideo(d.url, d.sub); }
                    else if (d.type === 'play') { v.currentTime = d.time; v.play().catch(()=>{}); }
                    else if (d.type === 'pause') { v.pause(); }
                });
            });
        }

        async function loadSubs(url) {
            subs = [];
            if (!url) return;
            try {
                const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                const res = await fetch(proxy);
                const text = await res.text();
                
                const blocks = text.split(/\n\s*\n/);
                blocks.forEach(b => {
                    const lines = b.split('\n');
                    let time = null;
                    let txt = [];
                    lines.forEach(l => {
                        if (l.includes('-->')) time = l.split(' --> ');
                        else if (time && l.trim() !== "") txt.push(l.trim());
                    });
                    if (time && txt.length > 0) {
                        subs.push({ s: parseTime(time[0]), e: parseTime(time[1]), t: txt.join('<br>') });
                    }
                });
            } catch (e) { console.error(e); }
        }

        function parseTime(t) {
            const p = t.trim().replace(',', '.').split(':');
            let s = 0;
            if (p.length === 3) s = (+p[0]*3600) + (+p[1]*60) + (+p[2]);
            else s = (+p[0]*60) + (+p[1]);
            return s;
        }

        v.ontimeupdate = () => {
            const now = v.currentTime;
            const match = subs.find(s => now >= s.s && now <= s.e);
            st.innerHTML = match ? match.t : "";
            st.parentElement.style.display = match ? "block" : "none";
        };

        function loadVideo(m, s) {
            v.pause();
            v.src = m;
            loadSubs(s);
            v.load();
        }

        function syncEverything() {
            const m = document.getElementById('movie-url').value.trim();
            const s = document.getElementById('sub-url').value.trim();
            loadVideo(m, s);
            if (conn && conn.open) conn.send({ type: 'load', url: m, sub: s });
        }

        v.onplay = () => { if(conn && conn.open) conn.send({ type: 'play', time: v.currentTime }); };
        v.onpause = () => { if(conn && conn.open) conn.send({ type: 'pause' }); };
    </script>
</body>
</html>
