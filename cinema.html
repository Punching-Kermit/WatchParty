<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Our Cinema</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2503/2503508.png">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 20px; margin: 0; }
        .panel { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #ff4757; font-size: 1.2rem; margin-bottom: 5px; }
        #my-id { color: #70a1ff; font-weight: bold; background: #000; padding: 8px; border-radius: 8px; display: block; margin: 10px auto; width: fit-content; font-size: 0.9rem; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-share { background: #ff4757; color: white; }
        .btn-connect { background: #2ed573; color: white; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 15px; }
        #local-video { width: 45%; border: 2px solid #ff4757; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Cinema Control</h2>
        <span id="my-id">CONNECTING...</span>
        <input type="text" id="friend-id" placeholder="Paste Friend's ID here">
        <button class="btn-connect" onclick="connectToFriend()">Connect to Friend</button>
        <button class="btn-share" onclick="startMovieShare()">Start Movie Share</button>
    </div>

    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>

    <script>
        const peer = new Peer({
            host: '0.peerjs.com',
            port: 443,
            secure: true,
            config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }
        });

        let myStream;

        peer.on('open', id => document.getElementById('my-id').innerText = id);
        
        peer.on('call', call => {
            call.answer(myStream);
            call.on('stream', s => document.getElementById('remote-video').srcObject = s);
        });

        async function startMovieShare() {
            try {
                // RESTRICTION REMOVED: Now it just attempts to share
                myStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = myStream;
            } catch (e) {
                alert("Permission Denied. Please ensure Brave has Screen Recording permissions.");
            }
        }

        function connectToFriend() {
            const fID = document.getElementById('friend-id').value;
            const call = peer.call(fID, myStream);
            call.on('stream', s => document.getElementById('remote-video').srcObject = s);
        }
    </script>
</body>
</html>
