<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Master Cinema Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 15px; margin: 0; }
        .panel { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        #my-id { color: #70a1ff; font-weight: bold; background: #000; padding: 8px; border-radius: 8px; display: block; margin: 10px auto; width: fit-content; font-size: 0.7rem; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; font-size: 0.9rem; }
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-connect { background: #70a1ff; color: white; }
        .btn-load { background: #2ed573; color: white; }
        .btn-sub { background: #eccc68; color: #333; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 15px; border: 1px solid #333; }
        #status { color: #ffa502; font-size: 0.8rem; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="panel">
        <span id="my-id">INITIALIZING...</span>
        <input type="text" id="friend-id" placeholder="Paste Friend's ID here">
        <button class="btn-connect" onclick="connectToFriend()">Connect / Save Friend</button>
        
        <hr style="border: 0.5px solid #333; margin: 15px 0;">
        
        <input type="text" id="movie-url" placeholder="Paste Movie .mp4 Link">
        <input type="text" id="sub-url" placeholder="Paste Subtitle .vtt Link (Optional)">
        <button class="btn-load" onclick="syncAll()">Sync Movie & Subs</button>
        <p id="status">Waiting...</p>
    </div>
    <video id="main-video" controls playsinline></video>

    <script>
        const video = document.getElementById('main-video');
        const status = document.getElementById('status');
        const friendInput = document.getElementById('friend-id');

        // 1. LOAD SAVED ID ON START
        window.onload = () => {
            const savedID = localStorage.getItem('savedFriendID');
            if(savedID) {
                friendInput.value = savedID;
                status.innerText = "Saved ID loaded. Click Connect.";
            }
        };

        const peer = new Peer({
            host: '0.peerjs.com', port: 443, secure: true,
            config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }
        });

        let conn;

        peer.on('open', id => {
            document.getElementById('my-id').innerText = "YOUR ID: " + id;
        });

        // 2. AUTO-RECEIVE CONNECTION
        peer.on('connection', c => {
            conn = c;
            status.innerText = "Friend Connected!";
            setupConn();
        });

        function connectToFriend() {
            const fID = friendInput.value.trim();
            if(!fID) return alert("Enter ID!");
            
            // SAVE TO PHONE MEMORY
            localStorage.setItem('savedFriendID', fID);
            
            status.innerText = "Connecting...";
            conn = peer.connect(fID, { reliable: true });
            conn.on('open', () => {
                status.innerText = "Connected & Saved!";
                setupConn();
            });
        }

        function setupConn() {
            conn.on('data', data => {
                if (data.type === 'sync') {
                    video.src = data.url;
                    if(data.subUrl) addSubs(data.subUrl);
                    video.load();
                } else if (data.type === 'play') {
                    video.currentTime = data.time;
                    video.play();
                } else if (data.type === 'pause') {
                    video.pause();
                }
            });
        }

        function addSubs(url) {
            // Remove old subs
            const oldTracks = video.querySelectorAll('track');
            oldTracks.forEach(t => t.remove());
            
            const track = document.createElement('track');
            track.kind = 'subtitles';
            track.label = 'English';
            track.srclang = 'en';
            track.src = url;
            track.default = true;
            video.appendChild(track);
        }

        function syncAll() {
            const mUrl = document.getElementById('movie-url').value;
            const sUrl = document.getElementById('sub-url').value;
            
            video.src = mUrl;
            if(sUrl) addSubs(sUrl);
            video.load();

            if (conn && conn.open) {
                conn.send({ type: 'sync', url: mUrl, subUrl: sUrl });
            }
        }

        video.onplay = () => { if (conn && conn.open) conn.send({ type: 'play', time: video.currentTime }); };
        video.onpause = () => { if (conn && conn.open) conn.send({ type: 'pause' }); };
    </script>
</body>
</html>
