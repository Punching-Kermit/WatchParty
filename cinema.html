<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Master Control Cinema</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 15px; margin: 0; }
        .panel { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        #my-id { color: #70a1ff; font-weight: bold; background: #000; padding: 8px; border-radius: 8px; display: block; margin: 10px auto; width: fit-content; font-size: 0.8rem; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-connect { background: #70a1ff; color: white; }
        .btn-load { background: #2ed573; color: white; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 15px; border: 1px solid #333; }
        #status { color: #888; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Cinema Control</h2>
        <span id="my-id">CONNECTING...</span>
        <input type="text" id="friend-id" placeholder="Paste Friend's ID here">
        <button class="btn-connect" onclick="connectToFriend()">1. Connect to Friend</button>
        <hr style="border: 0.5px solid #333; margin: 15px 0;">
        <input type="text" id="movie-url" placeholder="Paste .mp4 Link Here">
        <button class="btn-load" onclick="loadAndSend()">2. Load Movie for Both</button>
        <p id="status">Waiting for PeerJS...</p>
    </div>
    <video id="main-video" controls playsinline></video>

    <script>
        const peer = new Peer({
            host: '0.peerjs.com',
            port: 443,
            secure: true,
            config: { 
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' }
                ] 
            }
        });

        let conn;
        const video = document.getElementById('main-video');
        const status = document.getElementById('status');

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            status.innerText = "Ready! Share your ID.";
        });

        peer.on('connection', c => {
            conn = c;
            status.innerText = "Friend Connected!";
            setupConn();
        });

        function connectToFriend() {
            const fID = document.getElementById('friend-id').value.trim();
            if(!fID) return alert("Enter ID first!");
            status.innerText = "Searching...";
            conn = peer.connect(fID, { reliable: true });
            conn.on('open', () => {
                status.innerText = "Connected!";
                setupConn();
            });
        }

        function setupConn() {
            conn.on('data', data => {
                if (data.type === 'load') { video.src = data.url; video.load(); }
                else if (data.type === 'play') { video.currentTime = data.time; video.play(); }
                else if (data.type === 'pause') { video.pause(); }
            });
        }

        function loadAndSend() {
            const url = document.getElementById('movie-url').value;
            video.src = url;
            video.load();
            if (conn && conn.open) conn.send({ type: 'load', url: url });
        }

        video.onplay = () => { if (conn && conn.open) conn.send({ type: 'play', time: video.currentTime }); };
        video.onpause = () => { if (conn && conn.open) conn.send({ type: 'pause' }); };
    </script>
</body>
</html>
