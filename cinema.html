<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Cinema</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 10px; }
        .panel { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        input { width: 85%; padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }
        button { width: 45%; padding: 12px; margin: 5px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-play { background: #2ed573; color: white; }
        .btn-sync { background: #70a1ff; color: white; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 10px; border: 1px solid #444; }
        #my-id { color: #ff4757; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="panel">
        <p>Your ID: <span id="my-id">...</span></p>
        <input type="text" id="friend-id" placeholder="Paste Friend's ID here">
        <button class="btn-sync" onclick="connectToFriend()">1. Connect Friend</button>
        <hr style="border:0.5px solid #333">
        <input type="text" id="movie-url" placeholder="Paste .mp4 or Movie Link here">
        <button class="btn-play" onclick="loadAndSend()">2. Load Movie for Both</button>
    </div>

    <video id="main-video" controls playsinline></video>

    <script>
        const peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });
        let conn;
        const video = document.getElementById('main-video');

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // RECEIVER SIDE (Her iPhone)
        peer.on('connection', c => {
            conn = c;
            conn.on('data', data => {
                if (data.type === 'load') {
                    video.src = data.url;
                    video.load();
                } else if (data.type === 'play') {
                    video.play();
                } else if (data.type === 'pause') {
                    video.pause();
                }
            });
        });

        // SENDER SIDE (Your Android)
        function connectToFriend() {
            const fID = document.getElementById('friend-id').value;
            conn = peer.connect(fID);
            alert("Connected! Now paste a link.");
        }

        function loadAndSend() {
            const url = document.getElementById('movie-url').value;
            video.src = url;
            video.load();
            if (conn) conn.send({ type: 'load', url: url });
        }

        // AUTO-SYNC (When you press Play/Pause, she does too)
        video.onplay = () => { if (conn) conn.send({ type: 'play' }); };
        video.onpause = () => { if (conn) conn.send({ type: 'pause' }); };
    </script>
</body>
</html>
