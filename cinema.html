<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cinema Sync Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .panel { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; box-sizing: border-box; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-purple { background: #6c5ce7; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        
        .video-container { position: relative; width: 100%; margin-top: 15px; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        video { width: 100%; display: block; background: #000; }
        
        /* THE CUSTOM SUBTITLE OVERLAY */
        #custom-subs {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
            pointer-events: none; /* Allows you to tap the video through the text */
            z-index: 100;
        }
        #custom-subs span {
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 10px;
            border-radius: 5px;
            display: inline-block;
        }
        #status { color: #ffa502; font-size: 0.85rem; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="panel">
        <button class="btn-purple" onclick="shareInvite()" id="invite-btn">Copy Connection Link</button>
        <div id="status">System Ready</div>
        <input type="text" id="movie-url" placeholder="Movie Link">
        <input type="text" id="sub-url" placeholder="Subtitle Link (.vtt)">
        <button class="btn-green" onclick="syncEverything()">Sync & Play for All</button>
    </div>

    <div class="video-container">
        <video id="player" controls playsinline crossorigin="anonymous"></video>
        <div id="custom-subs"><span>Waiting for subtitles...</span></div>
    </div>

    <script>
        const v = document.getElementById('player');
        const status = document.getElementById('status');
        const subOverlay = document.getElementById('custom-subs');
        let conn, parsedSubs = [];
        const peer = new Peer();

        peer.on('open', id => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('join')) connectToPeer(urlParams.get('join'));
        });

        function shareInvite() {
            const inviteUrl = window.location.origin + window.location.pathname + "?join=" + peer.id;
            navigator.clipboard.writeText(inviteUrl);
            document.getElementById('invite-btn').innerText = "Link Copied!";
        }

        peer.on('connection', newConn => { conn = newConn; setupEvents(); });
        function connectToPeer(id) { conn = peer.connect(id); setupEvents(); }

        function setupEvents() {
            conn.on('open', () => {
                status.innerText = "STATUS: CONNECTED";
                conn.on('data', data => {
                    if (data.type === 'load') { loadVideo(data.url, data.sub); }
                    else if (data.type === 'play') { v.currentTime = data.time; v.play().catch(() => {}); }
                    else if (data.type === 'pause') { v.pause(); }
                });
            });
        }

        async function fetchAndParseSubs(url) {
            parsedSubs = [];
            if (!url) { subOverlay.style.display = 'none'; return; }
            try {
                const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                const response = await fetch(proxyUrl);
                const text = await response.text();
                
                const lines = text.split('\n');
                let currentSub = {};

                lines.forEach(line => {
                    if (line.includes('-->')) {
                        const parts = line.split(' --> ');
                        currentSub.start = timeToSeconds(parts[0]);
                        currentSub.end = timeToSeconds(parts[1]);
                    } else if (line.trim() !== '' && !line.startsWith('WEBVTT') && currentSub.start !== undefined) {
                        currentSub.text = line.trim();
                        parsedSubs.push({...currentSub});
                        currentSub = {};
                    }
                });
                subOverlay.style.display = 'block';
            } catch (e) { console.log("Sub Fetch Error", e); }
        }

        function timeToSeconds(t) {
            const parts = t.trim().split(':');
            let secs = 0;
            if (parts.length === 3) {
                secs = parseFloat(parts[0]) * 3600 + parseFloat(parts[1]) * 60 + parseFloat(parts[2].replace(',', '.'));
            } else {
                secs = parseFloat(parts[0]) * 60 + parseFloat(parts[1].replace(',', '.'));
            }
            return secs;
        }

        // UPDATE SUBTITLES EVERY TIME VIDEO PLAYS
        v.ontimeupdate = () => {
            const now = v.currentTime;
            const active = parsedSubs.find(s => now >= s.start && now <= s.end);
            if (active) {
                subOverlay.innerHTML = `<span>${active.text}</span>`;
            } else {
                subOverlay.innerHTML = "";
            }
        };

        function loadVideo(m, s) {
            v.pause();
            v.src = m;
            fetchAndParseSubs(s);
            v.load();
        }

        function syncEverything() {
            const m = document.getElementById('movie-url').value.trim();
            const s = document.getElementById('sub-url').value.trim();
            if(!m) return alert("Paste movie link!");
            loadVideo(m, s);
            if (conn && conn.open) conn.send({ type: 'load', url: m, sub: s });
        }

        v.onplay = () => { if(conn && conn.open) conn.send({ type: 'play', time: v.currentTime }); };
        v.onpause = () => { if(conn && conn.open) conn.send({ type: 'pause' }); };
    </script>
</body>
</html>
