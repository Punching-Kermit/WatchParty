<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cinema Sync Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .panel { background: #1b1b1b; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 14px; box-sizing: border-box; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-purple { background: #6c5ce7; color: white; margin-bottom: 10px; }
        .btn-green { background: #2ecc71; color: white; }
        video { width: 100%; border-radius: 12px; background: #000; margin-top: 15px; box-shadow: 0 4px 20px #000; }
        #status { color: #2ecc71; font-size: 0.85rem; margin: 10px 0; font-weight: bold; }
        ::cue { background: rgba(0,0,0,0.8); color: #fff; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="panel">
        <button class="btn-purple" onclick="shareInvite()" id="invite-btn">SHARE CONNECTION LINK</button>
        <div id="status">Connecting to System...</div>
        <input type="text" id="movie-url" placeholder="Paste Movie Link Here">
        <input type="text" id="sub-url" placeholder="Paste Subtitle Link Here">
        <button class="btn-green" onclick="syncEverything()">SYNC & PLAY</button>
    </div>
    <video id="player" controls playsinline crossorigin="anonymous"></video>
