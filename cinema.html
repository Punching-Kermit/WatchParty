<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Master Control Cinema</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 15px; margin: 0; }
        .panel { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #ff4757; margin: 0 0 10px 0; font-size: 1.2rem; }
        #my-id { color: #70a1ff; font-weight: bold; background: #000; padding: 8px; border-radius: 8px; display: block; margin: 10px auto; width: fit-content; font-size: 0.8rem; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; outline: none; }
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-connect { background: #70a1ff; color: white; }
        .btn-load { background: #2ed573; color: white; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 15px; border: 1px solid #333; }
        .status-msg { color: #888; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>Cinema Control</h2>
        <span id="my-id">CONNECTING...</span>
        
        <input type="text" id="friend-id" placeholder="Paste Friend's ID here">
        <button class="btn-connect" onclick="connectToFriend()">1. Connect to Friend</button>
        
        <hr style="border: 0.5px solid #333; margin: 15px 0;">
        
        <input type="text" id="movie-url" placeholder="Paste .mp4 Link Here">
        <button class="btn-load" onclick="loadAndSend()">2. Load Movie for Both</button>
        <p class="status-msg" id="status">Waiting for connection...</p>
    </div>

    <video id="main-video" controls playsinline></video>

    <script>
        const peer = new Peer({
            host: '0.peerjs.com',
            port: 443,
            secure: true,
            config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }
        });

        let conn;
        const video = document.getElementById('main-video');
        const status = document.getElementById('status');

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // RECEIVER SIDE (Her iPhone)
        peer.on('connection', c => {
            conn = c;
            status.innerText = "Friend Connected!";
            setupConn();
        });

        // SENDER SIDE (Your Android)
        function connectToFriend() {
            const fID = document.getElementById('friend-id').value;
            if(!fID) return alert("Enter ID first!");
            conn = peer.connect(fID);
            status.innerText = "Connecting to friend...";
            conn.on('open', () => {
                status.innerText = "Connected to Friend!";
                setupConn();
            });
        }

        function setupConn() {
            conn.on('data', data => {
                if (data.type === 'load') {
                    video.src = data.url;
                    video.load();
                } else if (data.type === 'play') {
                    video.currentTime = data.time;
                    video.play();
                } else if (data.type === 'pause') {
                    video.pause();
                }
            });
        }

        function loadAndSend() {
            const url = document.getElementById('movie-url').value;
            if(!url) return alert("Paste a movie link!");
            video.src = url;
            video.load();
            if (conn) conn.send({ type: 'load', url: url });
        }

        // REMOTE CONTROL: When you Play/Pause, it sends to her
        video.onplay = () => {
            if (conn) conn.send({ type: 'play', time: video.currentTime });
        };
        video.onpause = () => {
            if (conn) conn.send({ type: 'pause' });
        };
    </script>
</body>
</html>
