<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cinema Sync Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .panel { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section-box { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 15px; }
        .invite-btn { background: #6c5ce7; color: #fff; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .join-input-group { display: flex; gap: 5px; margin-top: 5px; }
        .join-input { flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; font-size: 0.8rem; }
        .join-btn { background: #444; color: #fff; border: none; padding: 10px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; }
        input.full-input { width: 100%; padding: 14px; box-sizing: border-box; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin-bottom: 10px; font-size: 0.9rem; }
        button.main-action { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-green { background: #2ecc71; color: white; margin-top: 10px; }
        video { width: 100%; border-radius: 12px; background: #000; margin-top: 15px; border: 1px solid #333; }
        #status { color: #ffa502; font-size: 0.85rem; margin: 10px 0; font-weight: bold; }
        ::cue { background: rgba(0,0,0,0.8); color: #fff; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="section-box">
            <button class="invite-btn" id="invite-btn" onclick="shareInvite()">Copy Connection Link</button>
            <div id="status">Ready to Connect</div>
            <div class="join-input-group">
                <input type="text" id="manual-id" class="join-input" placeholder="Or paste ID manually">
                <button class="join-btn" onclick="manualConnect()">Connect</button>
            </div>
        </div>

        <hr style="border: 0.5px solid #333; margin: 25px 0;">
        
        <input type="text" id="movie-url" class="full-input" placeholder="Direct Movie URL (MP4/MKV)">
        <input type="text" id="sub-url" class="full-input" placeholder="Subtitle URL (VTT)">
        <button class="main-action btn-green" onclick="syncEverything()">Sync & Play for All</button>
    </div>

    <video id="player" controls playsinline crossorigin="anonymous"></video>

    <script>
        const v = document.getElementById('player');
        const status = document.getElementById('status');
        const inviteBtn = document.getElementById('invite-btn');
        let conn;

        const peer = new Peer({ host: 'peerjs.com', secure: true });

        peer.on('open', id => {
            const urlParams = new URLSearchParams(window.location.search);
            const joinId = urlParams.get('join');
            if (joinId) {
                status.innerText = "Attempting Auto-Join...";
                connectToPartner(joinId);
            }
        });

        function shareInvite() {
            const inviteUrl = window.location.origin + window.location.pathname + "?join=" + peer.id;
            navigator.clipboard.writeText(inviteUrl);
            inviteBtn.innerText = "Link Copied!";
            setTimeout(() => { inviteBtn.innerText = "Copy Connection Link"; }, 3000);
        }

        function manualConnect() {
            const id = document.getElementById('manual-id').value.trim();
            if(id) connectToPartner(id);
        }

        peer.on('connection', c => {
            conn = c;
            status.innerText = "STATUS: CONNECTED";
            initConnection();
        });

        function connectToPartner(fID) {
            conn = peer.connect(fID);
            conn.on('open', () => {
                status.innerText = "STATUS: CONNECTED";
                initConnection();
            });
        }

        function initConnection() {
            conn.on('data', data => {
                if (data.type === 'load') {
                    v.src = data.url;
                    if(data.sub) applySubs(data.sub);
                    v.load(); 
                } else if (data.type === 'play') {
                    v.currentTime = data.time;
                    v.play();
                } else if (data.type === 'pause') {
                    v.pause();
                }
            });
        }

        function applySubs(url) {
            const old = v.querySelectorAll('track');
            old.forEach(t => t.remove());
            const track = document.createElement('track');
            track.src = url; track.kind = "subtitles"; track.srclang = "en"; track.label = "English"; track.default = true;
            v.appendChild(track);
        }

        function syncEverything() {
            const m = document.getElementById('movie-url').value.trim();
            const s = document.getElementById('sub-url').value.trim();
            
            if(!m) return alert("Paste movie link first!");

            // Local Update
            v.src = m;
            if(s) applySubs(s);
            v.load();

            // Partner Update
            if(conn && conn.open) {
                conn.send({ type: 'load', url: m, sub: s });
            }
        }

        v.onplay = () => { if(conn && conn.open) conn.send({ type: 'play', time: v.currentTime }); };
        v.onpause = () => { if(conn && conn.open) conn.send({ type: 'pause' }); };
    </script>
</body>
</html>
