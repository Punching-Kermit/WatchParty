<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Our Private Cinema</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 20px; }
        .panel { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-share { background: #ff4757; color: white; }
        .btn-connect { background: #2ed573; color: white; }
        #my-id { color: #70a1ff; font-weight: bold; background: #000; padding: 5px; border-radius: 5px; display: inline-block; margin-top: 10px; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Cinema Control</h2>
        <div>Your ID: <span id="my-id">CONNECTING...</span></div>
        <input type="text" id="friend-id" placeholder="Paste Friend's ID here" style="width:85%; padding:12px; margin:15px 0; border-radius:8px; border:none;">
        <button class="btn-connect" onclick="connectToFriend()">Connect to Friend</button>
        <button class="btn-share" onclick="startMovieShare()">Start Movie Share</button>
    </div>
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted style="width:45%; border: 2px solid #ff4757; margin-top:10px;"></video>

    <script>
        // FORCED CONNECTION SETTINGS
        const peer = new Peer({
            host: '0.peerjs.com',
            port: 443,
            secure: true,
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        let myStream;

        peer.on('open', id => {
            console.log('My peer ID is: ' + id);
            document.getElementById('my-id').innerText = id;
        });

        peer.on('error', err => {
            console.error(err);
            document.getElementById('my-id').innerText = "ERROR: Refresh Page";
        });

        peer.on('call', call => {
            call.answer(myStream);
            call.on('stream', s => document.getElementById('remote-video').srcObject = s);
        });

        async function startMovieShare() {
            try {
                myStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = myStream;
            } catch (e) {
                alert("Please enable 'Desktop Site' in your browser settings first!");
            }
        }

        function connectToFriend() {
            const fID = document.getElementById('friend-id').value;
            const call = peer.call(fID, myStream);
            call.on('stream', s => document.getElementById('remote-video').srcObject = s);
        }
    </script>
</body>
</html>
