<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Sync Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 10px; }
        .controls { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; }
        input { width: 80%; padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #007bff; color: #fff; font-weight: bold; }
        video { width: 100%; max-height: 70vh; margin-top: 10px; border-radius: 5px; box-shadow: 0 0 20px rgba(0,123,255,0.2); }
        #status { font-size: 0.8rem; color: #888; margin: 10px; }
        ::cue { background: rgba(0,0,0,0.8); color: #fff; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="controls" id="host-panel">
        <div id="my-id" style="font-size: 0.7rem;">Initializing ID...</div>
        <input type="text" id="partner-id" placeholder="Paste Her ID Here">
        <button onclick="connect()">1. Connect to Her</button>
        <hr style="border: 0.1px solid #333; margin: 10px;">
        <input type="text" id="movie-url" placeholder="Movie MP4/MKV Link">
        <input type="text" id="sub-url" placeholder="Subtitle VTT Link">
        <button onclick="syncAll()" style="background: #28a745;">2. Start Movie for Both</button>
    </div>

    <div id="status">Waiting for connection...</div>
    <video id="v" controls playsinline crossorigin="anonymous"></video>

    <script>
        const v = document.getElementById('v');
        const status = document.getElementById('status');
        const peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });
        let conn;

        // Auto-load her ID if you saved it before
        window.onload = () => {
            const saved = localStorage.getItem('partnerID');
            if(saved) document.getElementById('partner-id').value = saved;
        };

        peer.on('open', id => { document.getElementById('my-id').innerText = "YOUR ID: " + id; });

        // When she connects to you, or you to her
        peer.on('connection', c => {
            conn = c;
            status.innerText = "❤️ Connected! You are now in sync.";
            setupReceiver();
        });

        function connect() {
            const id = document.getElementById('partner-id').value;
            localStorage.setItem('partnerID', id);
            conn = peer.connect(id);
            conn.on('open', () => {
                status.innerText = "❤️ Connected! Ready to watch.";
                setupReceiver();
            });
        }

        function setupReceiver() {
            conn.on('data', data => {
                if (data.type === 'load') {
                    v.src = data.url;
                    if(data.sub) loadSubs(data.sub);
                    v.load();
                } else if (data.type === 'play') {
                    v.currentTime = data.time;
                    v.play();
                } else if (data.type === 'pause') {
                    v.pause();
                }
            });
        }

        function loadSubs(url) {
            const old = v.querySelectorAll('track');
            old.forEach(t => t.remove());
            const t = document.createElement('track');
            // Using a CORS Proxy to make sure the subtitle link isn't blocked on her iPhone
            t.src = "https://cors-anywhere.herokuapp.com/" + url; 
            t.kind = "subtitles"; t.srclang = "en"; t.label = "English"; t.default = true;
            v.appendChild(t);
        }

        function syncAll() {
            const mUrl = document.getElementById('movie-url').value;
            const sUrl = document.getElementById('sub-url').value;
            v.src = mUrl;
            if(sUrl) loadSubs(sUrl);
            v.load();
            if(conn) conn.send({ type: 'load', url: mUrl, sub: sUrl });
        }

        v.onplay = () => { if(conn) conn.send({ type: 'play', time: v.currentTime }); };
        v.onpause = () => { if(conn) conn.send({ type: 'pause' }); };
    </script>
</body>
</html>
