<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Our Private Cinema</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2503/2503508.png">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 20px; margin: 0; }
        .panel { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-share { background: #ff4757; color: white; }
        .btn-connect { background: #2ed573; color: white; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 10px; }
        #my-id { color: #70a1ff; font-weight: bold; background: #000; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Cinema Control</h2>
        <p>Your ID: <span id="my-id">Wait...</span></p>
        <input type="text" id="friend-id" placeholder="Paste ID here" style="width:80%; padding:10px; margin-bottom:10px; border-radius:5px;">
        <button class="btn-connect" onclick="connect()">Connect to Friend</button>
        <button class="btn-share" onclick="startShare()">Start Movie Share</button>
    </div>
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted style="width:40%; border: 2px solid #ff4757;"></video>

    <script>
        const peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });
        let myStream;

        peer.on('open', id => document.getElementById('my-id').innerText = id);
        peer.on('call', call => {
            call.answer(myStream);
            call.on('stream', s => document.getElementById('remote-video').srcObject = s);
        });

        async function startShare() {
            try {
                myStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = myStream;
            } catch (e) { alert("Switch Brave to 'Desktop Site' first!"); }
        }

        function connect() {
            const id = document.getElementById('friend-id').value;
            const call = peer.call(id, myStream);
            call.on('stream', s => document.getElementById('remote-video').srcObject = s);
        }
    </script>
</body>
</html>
