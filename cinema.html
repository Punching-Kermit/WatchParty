<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cinema Sync Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .panel { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; box-sizing: border-box; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-purple { background: #6c5ce7; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        video { width: 100%; border-radius: 12px; background: #000; margin-top: 15px; border: 1px solid #333; }
        #status { color: #ffa502; font-size: 0.85rem; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="panel">
        <button class="btn-purple" onclick="shareInvite()" id="invite-btn">1. GET CONNECTION LINK</button>
        <div id="status">Initializing System...</div>
        <input type="text" id="movie-url" placeholder="Paste Movie Link Here">
        <button class="btn-green" onclick="syncEverything()">2. SYNC & PLAY</button>
    </div>
    <video id="player" controls playsinline crossorigin="anonymous"></video>

    <script>
        const v = document.getElementById('player');
        const status = document.getElementById('status');
        const inviteBtn = document.getElementById('invite-btn');
        let conn;

        // Using Google's STUN servers to pierce through mobile data/firewalls
        const peer = new Peer({
            config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
        });

        peer.on('open', id => {
            status.innerText = "READY: TAP THE PURPLE BUTTON";
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('join')) connectToPartner(urlParams.get('join'));
        });

        function shareInvite() {
            if (!peer.id) return alert("System still loading, wait 2 seconds.");
            const url = window.location.origin + window.location.pathname + "?join=" + peer.id;
            navigator.clipboard.writeText(url);
            inviteBtn.innerText = "LINK COPIED! SEND TO HER";
        }

        peer.on('connection', newConn => {
            conn = newConn;
            setupEvents();
        });

        function connectToPartner(id) {
            status.innerText = "CONNECTING TO PARTNER...";
            conn = peer.connect(id);
            setupEvents();
        }

        function setupEvents() {
            conn.on('open', () => {
                status.innerText = "CONNECTED TO PARTNER";
                conn.on('data', data => {
                    if (data.type === 'load') { v.src = data.url; v.load(); }
                    else if (data.type === 'play') { v.currentTime = data.time; v.play().catch(() => {}); }
                    else if (data.type === 'pause') { v.pause(); }
                });
            });
            conn.on('error', () => { status.innerText = "CONNECTION FAILED. RETRY."; });
        }

        function syncEverything() {
            const m = document.getElementById('movie-url').value.trim();
            if(!m) return alert("Paste movie link!");
            v.src = m;
            v.load();
            if (conn && conn.open) conn.send({ type: 'load', url: m });
        }

        v.onplay = () => { if(conn && conn.open) conn.send({ type: 'play', time: v.currentTime }); };
        v.onpause = () => { if(conn && conn.open) conn.send({ type: 'pause' }); };
    </script>
</body>
</html>
