<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cinema Sync Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; text-align: center; margin: 0; padding: 15px; }
        .panel { background: #161616; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #e67e22; color: white; display: none; }
        video { width: 100%; border-radius: 12px; background: #000; margin-top: 15px; border: 1px solid #333; }
        #status { color: #ffa502; font-size: 0.85rem; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="panel">
        <div id="status">Connecting...</div>
        <input type="text" id="movie-url" placeholder="Paste Movie Link Here">
        <button class="btn-green" onclick="syncEverything()">SYNC & PLAY</button>
        <button id="force-btn" class="btn-orange" onclick="v.play()">TAP TO UNLOCK VIDEO</button>
    </div>
    <video id="player" controls playsinline crossorigin="anonymous"></video>

    <script>
        const v = document.getElementById('player');
        const status = document.getElementById('status');
        const forceBtn = document.getElementById('force-btn');
        const ROOM_ID = "mta-private-room-2026";
        let peer, conn;

        function init() {
            peer = new Peer({ config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}});

            peer.on('open', () => {
                const connection = peer.connect(ROOM_ID);
                setupEvents(connection);
            });

            const hostPeer = new Peer(ROOM_ID, { config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}});
            hostPeer.on('connection', (newConn) => { setupEvents(newConn); });
        }

        function setupEvents(newConn) {
            conn = newConn;
            conn.on('open', () => {
                status.innerText = "CONNECTED TO PARTNER";
                status.style.color = "#2ecc71";
                forceBtn.style.display = "block"; // Show unlock button for her
                
                conn.on('data', data => {
                    if (data.type === 'load') { 
                        v.src = data.url; 
                        v.load(); 
                    }
                    else if (data.type === 'play') { 
                        v.currentTime = data.time; 
                        v.play().catch(() => { status.innerText = "TAP 'UNLOCK VIDEO' BUTTON"; });
                    }
                    else if (data.type === 'pause') { v.pause(); }
                });
            });
        }

        function syncEverything() {
            const m = document.getElementById('movie-url').value.trim();
            if(!m) return alert("Paste link first!");
            v.src = m; v.load();
            if (conn && conn.open) conn.send({ type: 'load', url: m });
        }

        v.onplay = () => { if(conn && conn.open) conn.send({ type: 'play', time: v.currentTime }); };
        v.onpause = () => { if(conn && conn.open) conn.send({ type: 'pause' }); };

        init();
    </script>
</body>
</html>
